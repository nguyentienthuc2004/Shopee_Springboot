spring:
  application:
    name: shoppe

  datasource:
    url: jdbc:mysql://localhost:3306/shopee_clone
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false  # tắt cảnh báo open-in-view

logging:
  level:
    org.flywaydb: trace
    org.flywaydb.core: trace
    org.thuc.shoppe: debug
resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 3s

server:
  port: 8000
management:
  endpoints:
    web:
      exposure:
        include: "*"
jwt:
  secret: ZmFrZV9kZWZhdWx0X3NlY3JldF9mb3Jfc2hvcHBlZmFrZV9kZWZhdWx0X3NlY3JldF9mb3Jfc2hvcHBl
  expiration: 3600000 # 1 hour in milliseconds
payment:
  method: card
api_key: ${API_KEY}